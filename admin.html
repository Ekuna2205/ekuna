<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin PRO</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>

    <style>
        body {
            background: #0b1120;
            color: white;
            font-family: Poppins;
            padding: 20px;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
        }
        
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .card {
            background: #111827;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        img {
            max-width: 120px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>🔥 Admin Dashboard</h1>

    <div id="loginBox">
        <input id="email" placeholder="email">
        <input id="pass" type="password" placeholder="password">
        <button onclick="login()">Login</button>
    </div>

    <div id="admin" style="display:none;">

        <h2>➕ Project</h2>
        <input id="title" placeholder="title">
        <textarea id="desc" placeholder="description"></textarea>
        <input id="tech" placeholder="tech">
        <input type="file" id="file">

        <img id="preview" style="display:none">

        <button onclick="save()">Save</button>
        <button onclick="clearForm()">Clear</button>

        <hr>

        <input id="search" placeholder="Search...">

        <div id="list"></div>

        <hr>

        <h2>📊 Chart</h2>
        <canvas id="chart"></canvas>

    </div>

    <script>
        const ADMIN_EMAIL = "admin@gmail.com";
        const ADMIN_PASS = "123456";

        let editId = null;
        let oldImg = null;
        let all = [];

        function login() {
            if (
                document.getElementById("email").value === ADMIN_EMAIL &&
                document.getElementById("pass").value === ADMIN_PASS
            ) {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("admin").style.display = "block";
                load();
            } else alert("wrong");
        }

        document.getElementById("file").onchange = e => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = x => {
                preview.src = x.target.result;
                preview.style.display = "block";
            };
            r.readAsDataURL(f);
        };

        async function upload(f) {
            if (!f) return oldImg || "image.png";
            const name = Date.now() + "_" + f.name;
            await db.storage.from("projects").upload(name, f);
            return db.storage.from("projects").getPublicUrl(name).data.publicUrl;
        }

        async function save() {
            const title = titleInput.value;
            const desc = descInput.value;
            const tech = techInput.value;
            const file = fileInput.files[0];

            const img = await upload(file);

            if (editId) {
                await db.from("projects").update({
                    title,
                    description: desc,
                    tech,
                    image: img
                }).eq("id", editId);
            } else {
                await db.from("projects").insert({
                    title,
                    description: desc,
                    tech,
                    image: img
                });
            }

            clearForm();
            load();
        }

        function clearForm() {
            editId = null;
            oldImg = null;
            titleInput.value = "";
            descInput.value = "";
            techInput.value = "";
            fileInput.value = "";
            preview.style.display = "none";
        }

        async function load() {
            const {
                data
            } = await db.from("projects").select("*").order("id", {
                ascending: false
            });
            all = data;
            render(data);
            chart();
        }

        function render(arr) {
            list.innerHTML = arr.map(p => `
    <div class="card">
      <img src="${p.image}">
      <h3>${p.title}</h3>
      <p>${p.description}</p>
      <small>${p.tech}</small><br><br>

      <button onclick='edit(${JSON.stringify(p)})'>Edit</button>
      <button onclick='del(${p.id})'>Delete</button>
    </div>
  `).join("");
        }

        function edit(p) {
            editId = p.id;
            oldImg = p.image;

            titleInput.value = p.title;
            descInput.value = p.description;
            techInput.value = p.tech;

            preview.src = p.image;
            preview.style.display = "block";
        }

        async function del(id) {
            await db.from("projects").delete().eq("id", id);
            load();
        }

        search.oninput = e => {
            const v = e.target.value.toLowerCase();
            render(all.filter(x => JSON.stringify(x).toLowerCase().includes(v)));
        };

        async function chart() {
            const {
                data
            } = await db.from("visits").select("created_at");

            const d = {};
            data.forEach(v => {
                const day = v.created_at.slice(0, 10);
                d[day] = (d[day] || 0) + 1;
            });

            new Chart(chartCanvas, {
                type: "line",
                data: {
                    labels: Object.keys(d),
                    datasets: [{
                        label: "views",
                        data: Object.values(d)
                    }]
                }
            });
        }
    </script>

</body>

</html>
