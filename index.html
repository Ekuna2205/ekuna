<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuma Ultra Portfolio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3"></script>

    <style>
        body {
            background: #0b1120;
            color: white;
            font-family: Poppins;
            margin: 0;
        }
        /* NAV */
        
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(0, 0, 0, .4);
            position: fixed;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        
        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }
        /* HERO */
        
        .hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 80px;
        }
        
        .hero h1 {
            font-size: 60px;
        }
        
        .hero span {
            color: #38bdf8;
        }
        
        .btn {
            padding: 12px 20px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        /* CARD */
        
        .card3d {
            width: 350px;
            height: 420px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px black;
            transition: .2s;
        }
        
        .card3d img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* PROJECT */
        
        .projects {
            padding: 60px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .project {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
        }
        
        .project img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        /* CONTACT */
        
        .contact {
            padding: 60px;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }
        /* FOOTER */
        
        footer {
            text-align: center;
            padding: 20px;
            background: #111827;
        }
        
        @media(max-width:900px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h2>Kuma</h2>
        <div>
            <a href="#home">Home</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero" id="home">
        <div>
            <h1>Сайн байна уу <br> <span id="heroName">Ekuna</span></h1>
            <p id="typing"></p>
            <p id="heroDesc">Loading...</p>
            <button class="btn">Projects</button>
            <p>📦 <span id="projectCountHero">0</span> | 👁 <span id="viewCountHero">0</span></p>
        </div>

        <div class="card3d" id="card3d">
            <img src="2.png">
        </div>
    </section>

    <section class="projects" id="projects">
        <h2>Projects</h2>
        <div class="grid" id="projectList"></div>
    </section>

    <section class="contact" id="contact">
        <h2>Contact</h2>
        <input placeholder="Name">
        <input placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button class="btn">Send</button>
    </section>

    <footer>
        © 2026 Kuma Portfolio
    </footer>

    <script src="config.js"></script>

    <script>
        // typing
        const roles = ["Developer", "Designer", "Engineer"];
        let i = 0,
            j = 0,
            isDel = false;

        function type() {
            let txt = roles[i].substring(0, j);
            typing.innerText = txt;

            if (!isDel) {
                j++;
                if (j > roles[i].length) {
                    isDel = true;
                    setTimeout(type, 1000);
                    return;
                }
            } else {
                j--;
                if (j == 0) {
                    isDel = false;
                    i = (i + 1) % roles.length;
                }
            }

            setTimeout(type, isDel ? 50 : 100);
        }
        type();

        // 3D hover
        card3d.onmousemove = e => {
            const r = card3d.getBoundingClientRect();
            const x = e.clientX - r.left;
            const y = e.clientY - r.top;

            card3d.style.transform = `rotateX(${-(y/10)}deg) rotateY(${x/10}deg)`;
        };
        card3d.onmouseleave = () => card3d.style.transform = "rotate(0)";

        // DB
        async function loadSettings() {
            const {
                data
            } = await db.from("site_settings").select("*").eq("id", 1).single();
            if (data) {
                heroName.innerText = data.name;
                heroDesc.innerText = data.description;
            }
        }

        async function loadProjects() {
            const {
                data
            } = await db.from("projects").select("*");
            projectCountHero.innerText = data.length;

            projectList.innerHTML = data.map(p => `
<div class="project">
<img src="${p.image}">
<h3>${p.title}</h3>
<p>${p.description}</p>
</div>
`).join("");
        }

        async function loadViews() {
            const {
                count
            } = await db.from("visits").select("*", {
                count: "exact",
                head: true
            });
            viewCountHero.innerText = count || 0;
        }

        async function track() {
            await db.from("visits").insert({
                page: "home"
            });
        }

        async function init() {
            await loadSettings();
            await loadProjects();
            await loadViews();
            await track();
        }
        init();

        // animation
        gsap.from("nav", {
            y: -50,
            opacity: 0
        });
        gsap.from(".hero h1", {
            y: 50,
            opacity: 0
        });
    </script>

</body>

</html>
